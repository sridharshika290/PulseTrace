---
# Backend service
apiVersion: v1
kind: Service
metadata:
  name: pulsetrace-backend
spec:
  selector:
    app: pulsetrace-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
# Frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsetrace-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pulsetrace-frontend
  template:
    metadata:
      labels:
        app: pulsetrace-frontend
    spec:
      containers:
        - name: frontend
          image: pulsetrace_frontend:latest
          ports:
            - containerPort: 80

---
# Frontend service
apiVersion: v1
kind: Service
metadata:
  name: pulsetrace-frontend
spec:
  selector:
    app: pulsetrace-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsetrace-config
data:
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

---
# Secret template (fill with real values via kubectl or CI)
apiVersion: v1
kind: Secret
metadata:
  name: pulsetrace-secret
type: Opaque
stringData:
  # example: base64 values or stringData supported
  APP_SECRET_KEY: "replace-with-secret"

---
# HorizontalPodAutoscaler example for backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulsetrace-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulsetrace-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
