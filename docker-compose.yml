version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: pulsetrace_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: pulsetrace_kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    container_name: pulsetrace_redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  vault:
    image: vault:1.14.0
    container_name: pulsetrace_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: 'root'
      VAULT_DEV_LISTEN_ADDRESS: '0.0.0.0:8200'
    command: server -dev -dev-listen-address=0.0.0.0:8200
    ports:
      - '8200:8200'

  vault-init:
    image: curlimages/curl:8.4.0
    container_name: pulsetrace_vault_init
    depends_on:
      - vault
    volumes:
      - ./backend/scripts:/scripts:ro
    environment:
      VAULT_ADDR: 'http://vault:8200'
      VAULT_TOKEN: 'root'
      VAULT_SECRET_API_KEY: 'local-api-key'
    command: ["sh", "/scripts/vault-init.sh"]

  backend:
    build:
      context: ./backend
    container_name: pulsetrace_backend
    depends_on:
      - kafka
      - redis
      - vault-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: 'kafka:9092'
      REDIS_URL: 'redis://redis:6379/0'
      SIMULATOR_MODE: 'false'
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
      VAULT_ADDR: 'http://vault:8200'
      VAULT_TOKEN: 'root'
      CORS_ORIGINS: 'http://localhost:5173'
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
    container_name: pulsetrace_frontend
    depends_on:
      - backend
    ports:
      - '5173:80'
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.79.0
    container_name: pulsetrace_otel
    command: ["--config", "/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP

  prometheus:
    image: prom/prometheus:2.47.0
    container_name: pulsetrace_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:10.2.1
    container_name: pulsetrace_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - '3000:3000'
    depends_on:
      - prometheus

volumes:
  redis-data:
    driver: local
