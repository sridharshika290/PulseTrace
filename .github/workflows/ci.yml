name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ['6379:6379']
      zookeeper:
        image: confluentinc/cp-zookeeper:7.0.1
      kafka:
        image: confluentinc/cp-kafka:7.0.1
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    steps:
      - uses: actions/checkout@v4

      - name: Start docker compose (backend stack)
        run: |
          docker compose -f docker-compose.yml up -d zookeeper kafka redis
          sleep 15

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[redis,kafka]

      - name: Run backend tests
        working-directory: ./backend
        run: pytest -q
      - name: Run contract tests
        working-directory: ./backend
        run: pytest tests/test_contract.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install and build frontend
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build
  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install and run Playwright E2E
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build
          npx playwright install --with-deps
          # serve the built site on port 5173 in background
          npx serve -s dist -l 5173 &
          npx playwright test
name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
